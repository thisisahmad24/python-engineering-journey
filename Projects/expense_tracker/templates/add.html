<html>
<head>
    <title>Add Expense</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">

<div class="container mt-5">
    <h2>Add Expense</h2>

    <form method="post">
        <input name="amount" class="form-control mb-2" placeholder="Amount" required>
        <input name="category" class="form-control mb-2" placeholder="Category" required>
        <input name="desc" class="form-control mb-2" placeholder="Description">
        <button class="btn btn-success">Add</button>
    </form>
</div>

</body>
</html>
